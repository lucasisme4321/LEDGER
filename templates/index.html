<!DOCTYPE html>
<html>
<head>
<title>LEDGER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #181818;
    --surface-hover: #282828;
    --elevated: #202020;
    --green: #1DB954;
    --green-bright: #1ED760;
    --text: #FFFFFF;
    --text-dim: #a7a7a7;
    --text-faint: #6a6a6a;
    --border: #2a2a2a;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Top bar ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    color: #000;
    flex-shrink: 0;
  }

  .brand-name {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: -2px;
  }

  #settingsToggle {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #settingsToggle:hover {
    color: var(--text);
    border-color: #444;
  }

  /* ---------- Settings drawer ---------- */
  #settings {
    max-height: 0;
    overflow: hidden;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: max-height 0.25s ease;
    flex-shrink: 0;
  }
  #settings.open {
    max-height: 400px;
  }
  #settingsInner {
    padding: 20px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) {
    #settingsInner { grid-template-columns: 1fr; }
  }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
  }

  select, textarea, input[type=text], input[type=file] {
    background: var(--elevated);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--green);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.5;
  }

  .upload-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .upload-row input[type=text] { flex: 1; min-width: 140px; }

  .pill-btn {
    background: var(--green);
    color: #000;
    border: 0;
    border-radius: 20px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease;
    white-space: nowrap;
  }
  .pill-btn:hover {
    background: var(--green-bright);
    transform: scale(1.03);
  }
  .pill-btn:active { transform: scale(0.98); }

  #uploadStatus {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* ---------- Chat area ---------- */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #chat::-webkit-scrollbar { width: 10px; }
  #chat::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 10px; }
  #chat::-webkit-scrollbar-track { background: transparent; }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-faint);
  }
  .empty-state .brand-mark {
    width: 56px; height: 56px; font-size: 26px;
    margin: 0 auto 16px;
  }
  .empty-state p { font-size: 14px; margin: 4px 0; }

  .msg {
    padding: 13px 18px;
    border-radius: 18px;
    max-width: 70%;
    font-size: 14.5px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .user {
    background: var(--green);
    color: #000;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .bot {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }

  .bot.thinking {
    color: var(--text-faint);
    font-style: italic;
  }

  /* ---------- Input bar ---------- */
  #box {
    display: flex;
    gap: 10px;
    padding: 18px 28px 24px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  #text {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 14px 20px;
    font-size: 14.5px;
    font-family: inherit;
  }
  #text:focus {
    outline: none;
    border-color: var(--green);
  }
  #text::placeholder { color: var(--text-faint); }

  #sendBtn {
    background: var(--green);
    color: #000;
    border: 0;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  #sendBtn:hover {
    background: var(--green-bright);
    transform: scale(1.06);
  }
  #sendBtn:active { transform: scale(0.96); }
  #sendBtn svg { width: 20px; height: 20px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>

<body>

<header>
  <div class="brand">
    <div class="brand-mark">L</div>
    <div>
      <div class="brand-name">LEDGER</div>
      <div class="brand-sub">Investment Research</div>
    </div>
  </div>
  <button id="settingsToggle" onclick="toggleSettings()">Settings</button>
</header>

<div id="settings">
  <div id="settingsInner">
    <div>
      <label class="field-label">Model</label>
      <select id="model">
        <option value="ledger">LEDGER (custom)</option>
        <option value="llama3.1:8b">Llama 3.1 8B</option>
        <option value="llama3.2:1b">Llama 3.2 1B</option>
        <option value="llama3:latest">Llama 3</option>
      </select>

      <label class="field-label" style="margin-top:16px;">Personality</label>
      <textarea id="system">You are Lucas AI.
You are a professional investment analyst.
Give precise answers.
Explain your reasoning.</textarea>
    </div>

    <div>
      <label class="field-label">Upload to knowledge base</label>
      <input type="file" id="fileInput" />
      <div class="upload-row">
        <input type="text" id="tickerInput" placeholder="Ticker (optional, e.g. NVDA)" />
        <button class="pill-btn" onclick="uploadFile()">Upload</button>
      </div>
      <div id="uploadStatus"></div>
    </div>
  </div>
</div>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <div class="brand-mark">L</div>
    <p>Ask LEDGER about a ticker, a trend, or your portfolio.</p>
  </div>
</div>

<div id="box">
  <input id="text" placeholder="Ask about a stock, sector, or trend..." onkeydown="if(event.key==='Enter') send()" />
  <button id="sendBtn" onclick="send()" aria-label="Send">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<script>

function toggleSettings(){
    document.getElementById("settings").classList.toggle("open");
}

async function send(){

    let input = document.getElementById("text");
    let message = input.value.trim();

    if(!message) return;

    document.getElementById("emptyState")?.remove();

    add(message, "user");
    input.value = "";

    let thinkingEl = add("Thinking...", "bot thinking");

    let r = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            question: message,
            model: document.getElementById("model").value,
            system: document.getElementById("system").value
        })
    });

    let data = await r.json();

    thinkingEl.remove();

    if(data.error){
        add("Error: " + data.error, "bot");
    } else {
        add(data.answer, "bot");
    }
}

function add(text, type){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    return div;
}

async function uploadFile(){
    let fileInput = document.getElementById("fileInput");
    let ticker = document.getElementById("tickerInput").value || "GENERAL";
    let status = document.getElementById("uploadStatus");

    if(!fileInput.files.length){
        status.innerText = "Pick a file first.";
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("ticker", ticker);
    formData.append("collection", "personal_thesis");

    status.innerText = "Uploading and embedding...";

    let r = await fetch("/api/knowledge/upload", {
        method: "POST",
        body: formData
    });

    let data = await r.json();

    if(data.error){
        status.innerText = "Error: " + data.error;
    } else {
        status.innerText = `Added ${data.chunks_added} chunks from ${data.filename}`;
    }
}

</script>

</body>
</html>
